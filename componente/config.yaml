# Configuração MIPS - Correção de Esconamento de Área
DESIGN_NAME: mips_top
VERILOG_FILES: dir::*.sv

# Clock
CLOCK_PORT: clk
CLOCK_PERIOD: 20

# 1. FORÇAR USO DE ÁREA FIXA:
# Removemos o FP_CORE_UTIL para evitar que ele encolha o chip.
DIE_AREA: [0, 0, 500, 500]
CORE_AREA: [40, 40, 460, 460]

# 2. PDN AJUSTADO:
# Com a área de 500x500, podemos usar offsets mais seguros.
PDN_VOFFSET: 5
PDN_HOFFSET: 5
PDN_VPITCH: 100
PDN_HPITCH: 100

# 3. OUTROS PARÂMETROS:
DRT_THREADS: 4
RT_MAX_LAYER: Met5
