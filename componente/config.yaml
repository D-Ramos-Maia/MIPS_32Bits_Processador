# Configuração Corrigida para Geometria de PDN (PDK IHP-SG13G2)
DESIGN_NAME: mips_top
VERILOG_FILES: dir::*.sv

# Definições de Clock
CLOCK_PORT: clk
CLOCK_PERIOD: 20

# Áreas mantidas conforme seu projeto
DIE_AREA: [0, 0, 500, 500]
CORE_AREA: [40, 40, 460, 460]

PDN_VOFFSET: 5
PDN_HOFFSET: 5
PDN_VPITCH: 120
PDN_HPITCH: 120

# Mantendo as outras configurações de paralelismo e densidade[cite: 2]
DRT_THREADS: 4
FP_CORE_UTIL: 20
RT_MAX_LAYER: Met5
