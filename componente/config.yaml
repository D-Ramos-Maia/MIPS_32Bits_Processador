# Configuração Corrigida para LibreLane (PDK IHP-SG13G2)
DESIGN_NAME: mips_top
VERILOG_FILES: dir::*.sv

# Definições de Clock
CLOCK_PORT: clk
CLOCK_PERIOD: 20

# 1. Correção de Erro: Áreas devem ser listas [x0, y0, x1, y1]
DIE_AREA: [0, 0, 500, 500]
CORE_AREA: [40, 40, 460, 460]

# 2. Correção de Depreciação: Novos nomes para variáveis PDN
PDN_VOFFSET: 10
PDN_HOFFSET: 10
PDN_VPITCH: 100
PDN_HPITCH: 100

# 3. Correção de Depreciação: Threading
DRT_THREADS: 4

# Outros parâmetros de densidade e camadas
FP_CORE_UTIL: 20
RT_MAX_LAYER: Met5
